name: GitHub Copilot Bridge Addon
version: "1.0.1"
slug: github_copilot_bridge
hostname: github-copilot-bridge
description: >
  Runs the GitHub Copilot CLI in headless ACP server mode so the GitHub Copilot
  integration can connect to it remotely. Install and configure this add-on first,
  then add the GitHub Copilot integration and point it at this add-on's URL.
  The server listens on port 7681 by default (internal Supervisor network only).
url: https://github.com/tserra30/Github-Copilot-SDK-integration
arch:
  - aarch64
  - amd64
ports:
  7681/tcp: null
ports_description:
  7681/tcp: GitHub Copilot CLI ACP server (internal Supervisor network only)
options:
  github_token: ""
  port: 7681
schema:
  github_token: password
  port: int
init: false
startup: application
boot: auto
